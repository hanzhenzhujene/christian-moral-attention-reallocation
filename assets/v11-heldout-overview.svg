    <text x="350" y="224" font-size="38" font-weight="700" fill="#0f766e">0.0</text>
    <text x="350" y="254" font-size="14" fill="#5c6b7c"><tspan x="350" dy="0">No JSON or schema failures</tspan><tspan x="350" dy="18">in the held-out run.</tspan></text>
    
  
    <rect x="596" y="142" width="250" height="146" rx="18" fill="#f8fafc" stroke="#d7dee8" />
    <text x="620" y="174" font-size="18" font-weight="600" fill="#122033">Same-Heart Control</text>
    <text x="620" y="224" font-size="38" font-weight="700" fill="#0f766e">1.0</text>
    <text x="620" y="254" font-size="14" fill="#5c6b7c"><tspan x="620" dy="0">All model-condition cells</tspan><tspan x="620" dy="18">preserved Same on controls.</tspan></text>
    
  
    <rect x="866" y="142" width="278" height="146" rx="18" fill="#f8fafc" stroke="#d7dee8" />
