<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="930" viewBox="0 0 1200 930" role="img" aria-labelledby="title desc">
  <title id="title">Christian Moral Attention Reallocation: held-out v11 pilot overview</title>
  <desc id="desc">Held-out v11 pilot summary showing zero parse failures, perfect same-heart control behavior, zero heart overreach, and residual Task B swap-gap concentrated in same-act different-motive pairs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf8" />
      <stop offset="100%" stop-color="#f3f7fb" />
    </linearGradient>
  </defs>
  <rect width="1200" height="930" fill="url(#bg)" />
  <text x="56" y="74" font-size="40" font-weight="800" fill="#122033">Christian Moral Attention Reallocation</text>
  <text x="56" y="108" font-size="20" fill="#5c6b7c">Held-out v11 pilot: benchmark-assisted multi-pass Task B removes same-heart overreach, but order sensitivity still blocks full freeze.</text>

  
    <rect x="56" y="142" width="250" height="146" rx="18" fill="#f8fafc" stroke="#d7dee8" />
