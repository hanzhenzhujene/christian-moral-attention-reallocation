    <text x="80" y="224" font-size="38" font-weight="700" fill="#0f766e">120/120</text>
    <text x="80" y="254" font-size="14" fill="#5c6b7c"><tspan x="80" dy="0">Both Qwen models completed</tspan><tspan x="80" dy="18">every held-out job.</tspan></text>
    
  
    <rect x="326" y="142" width="250" height="146" rx="18" fill="#f8fafc" stroke="#d7dee8" />
